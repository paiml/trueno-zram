# Per-repo CI workflow — self-hosted clean-room runners for sovereignty (§2.1.1)
# Spec: docs/specifications/unified-ci-pipeline.md
#
# Calls the unified reusable gate workflow in paiml/.github.
# Branch protection requires "unified / gate" to pass before merge.

name: CI

on:
  pull_request_target:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:  # manual trigger for testing

# One CI run per branch/PR; cancel stale runs on same branch
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unified:
    uses: paiml/.github/.github/workflows/unified-gate.yml@b6c24635217fe302ca1a67352b7de540fb3e02e7 # pin to SHA
    with:
      repo: ${{ github.event.repository.name }}
      pr_sha: ${{ github.event.pull_request.head.sha || github.sha }}
    secrets: inherit

  coverage:
    runs-on: [self-hosted, clean-room]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo install cargo-llvm-cov --locked || true
      - run: cargo llvm-cov test --lib --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
        continue-on-error: true

  gate:
    name: gate
    runs-on: [self-hosted, clean-room]
    if: always()
    needs: [coverage]
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.coverage.result }}" = "failure" ]; then
            exit 1
          fi
